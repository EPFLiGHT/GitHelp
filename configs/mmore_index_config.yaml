# MMORE indexing configuration used to build the GitHelp retrieval index.

indexer:
  dense_model:
    model_name: sentence-transformers/all-MiniLM-L6-v2
    is_multimodal: false

  sparse_model:
    model_name: splade
    is_multimodal: false

  db:
    uri: ./data/indexes/mmore/githelp.db
    name: my_db

# Collection used to store the indexed GitHelp corpus.
collection_name: mmore_docs

# MMORE-compatible JSONL file produced from the GitHelp corpus.
documents_path: data/processed/mmore_corpus.jsonl