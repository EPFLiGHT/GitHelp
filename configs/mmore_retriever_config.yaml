# MMORE retrieval configuration used by the GitHelp MMORE backend.

db:
  uri: ./data/indexes/mmore/githelp.db
  name: my_db

# Weight between dense and sparse retrieval in hybrid search.
hybrid_search_weight: 0.5

# Default number of retrieved results.
k: 5

# Collection containing the indexed GitHelp corpus.
collection_name: mmore_docs

# Web search is disabled because GitHelp should answer from the indexed project corpus.
use_web: false

# Optional reranker model. Null means no reranker is used.
reranker_model_name: null
