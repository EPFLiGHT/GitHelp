# Streamlit application settings.

app_title: DocAsk
app_subtitle: Ask questions about a project's documentation

# Whether retrieved sources should be displayed in the UI.
show_sources: true

# Default number of retrieved documents shown to the answerer.
default_top_k: 5

project_profile: mmore  # change to generic for another repository

llm:
  provider: qwen
  model_name: Qwen/Qwen3-1.7B
  max_new_tokens: 512
  temperature: 0.0
  enable_thinking: false